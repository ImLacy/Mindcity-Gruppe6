services:
  gruppe6:
    build: .
    container_name: bot-gruppe6
    restart: unless-stopped

    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GUILD_ID=${GUILD_ID}
      - CLIENT_ID=${CLIENT_ID}

    volumes:
      - ./data.json:/app/G6/data.json

    networks:
      - bots

    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
        labels: "service"
        loki-timeout: "2s"
        loki-retries: "3"
        loki-batch-wait: "1s"
    stop_grace_period: 10s

networks:
  bots:
    external: true